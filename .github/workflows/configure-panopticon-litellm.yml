# Instance bootstrap: configures the organization-wide LiteLLM provider using names only.
name: Configure Panopticon — LiteLLM

on:
  workflow_dispatch:
    inputs:
      instance_token_name:
        description: Organization secret name for the GitHub token that checks out the private instance repo
        required: false
        default: PANOPTICON_INSTANCE_TOKEN
      api_key_name:
        description: Organization secret name for the LiteLLM API key
        required: false
        default: PANOPTICON_LLM_API_KEY
      model_variable_name:
        description: Organization variable name for the LiteLLM model (value example gpt-4o-mini)
        required: false
        default: PANOPTICON_LLM_MODEL
      endpoint_variable_name:
        description: Organization variable name for the LiteLLM endpoint (value example https://llm.example.com)
        required: false
        default: PANOPTICON_LLM_ENDPOINT
      timeout_seconds_variable_name:
        description: Organization variable name for the per-request timeout
        required: false
        default: PANOPTICON_LLM_TIMEOUT_SECONDS
      max_attempts_variable_name:
        description: Organization variable name for transport attempts
        required: false
        default: PANOPTICON_LLM_MAX_ATTEMPTS
      max_correction_attempts_variable_name:
        description: Organization variable name for structured-response correction attempts
        required: false
        default: PANOPTICON_LLM_MAX_CORRECTION_ATTEMPTS
      job_timeout_minutes_variable_name:
        description: Organization variable name for the PR-evaluation job timeout
        required: false
        default: PANOPTICON_LLM_JOB_TIMEOUT_MINUTES

permissions:
  contents: write

concurrency:
  group: panopticon-provider-configuration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the instance
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure LiteLLM
        uses: ./.github/actions/configure-panopticon
        with:
          provider: litellm
          instance-token-name: ${{ inputs.instance_token_name }}
          api-key-name: ${{ inputs.api_key_name }}
          model-variable-name: ${{ inputs.model_variable_name }}
          endpoint-variable-name: ${{ inputs.endpoint_variable_name }}
          timeout-seconds-variable-name: ${{ inputs.timeout_seconds_variable_name }}
          max-attempts-variable-name: ${{ inputs.max_attempts_variable_name }}
          max-correction-attempts-variable-name: ${{ inputs.max_correction_attempts_variable_name }}
          job-timeout-minutes-variable-name: ${{ inputs.job_timeout_minutes_variable_name }}
          target-branch: ${{ github.ref_name }}
