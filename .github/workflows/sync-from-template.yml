# This fixed caller intentionally has no configurable inputs. The template owns the sync logic,
# so a repaired shared workflow is used by every instance on its next sync.
name: Sync from template

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'  # weekly, Monday 09:00 UTC

jobs:
  sync:
    permissions:
      contents: write
    uses: industrial-curiosity/panopticon-ay-eye/.github/workflows/shared-template-sync-caller-only.yml@main
    secrets:
      instance_token: ${{ secrets.PANOPTICON_INSTANCE_TOKEN }}
