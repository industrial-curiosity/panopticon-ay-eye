# Pulls updates from the panopticon-ay-eye template repo into this instance repo.
#
# Run manually from Actions → Sync from template → Run workflow.
# If the merge produces conflicts (e.g. panopticon.config.json edited on both sides),
# the workflow fails with instructions to resolve locally.
#
# Protected instance-local config (architecture-diagrams design D7): every path registered in
# panopticon/config.py's PROTECTED_CONFIG_FILES (e.g. panopticon.diagram.config.json) is excluded
# from the merge entirely via .gitattributes' `merge=ours` — the instance's version always wins,
# in both the first-sync (no common ancestor) and routine-sync paths. Confirmed by spike (design.md
# Open Questions): this requires `git config merge.ours.driver true` to be registered locally on
# every run, since the driver's command lives in git config, not in versioned .gitattributes
# content. After a successful merge, a field-diff warning step compares the incoming template
# version's top-level JSON fields against the instance's (unchanged) current file for each
# registered path, warning (never blocking) when the template added or removed a field.
#
# Org-declared instance-level customization protection (tooling-currency capability, design D6):
# panopticon.config.json's org-declared `protected_paths` field lists arbitrary paths (skills,
# vendored tooling modules, future plugin content) customized at the instance level. Unlike
# PROTECTED_CONFIG_FILES, these are written to .git/info/attributes — never the tracked
# .gitattributes — every run, before the merge step, since an uncommitted edit to a *tracked* file
# aborts the merge outright the moment the incoming side also touches that file (verified
# empirically; see design.md D6). This file lives entirely inside .git/, is never tracked, and
# needs no commit; the same `merge.ours.driver` registered below covers both mechanisms. Because
# this protection leaves no trace in the tracked tree, the step prints every protected path to the
# step summary as the run's only audit trail.
#
# Optionally enable the schedule below to check for updates automatically.
name: Sync from template

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'  # weekly, Monday 09:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fine-grained PAT with Contents R/W on this repo — required because GITHUB_TOKEN
          # cannot push to .github/workflows/ regardless of permissions granted to the job.
          token: ${{ secrets.PANOPTICON_INSTANCE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch template
        run: |
          git remote add template https://github.com/industrial-curiosity/panopticon-ay-eye.git 2>/dev/null || true
          git fetch template main

      - name: Register protected-config merge driver
        run: |
          # .gitattributes maps each PROTECTED_CONFIG_FILES path to the "ours" driver name, but the
          # driver's actual behavior (keep the current branch's version) lives in git config, not in
          # versioned content — git does not allow arbitrary merge commands to come from untrusted
          # repo content. Must be registered locally on every run. Confirmed by spike (design.md
          # Open Questions) to engage correctly in both the first-sync (-X theirs,
          # --allow-unrelated-histories) and routine-sync (default strategy) paths below.
          git config merge.ours.driver true

      # Regenerated every run (this file is untracked and lives entirely inside .git/, so nothing
      # here persists across runs on its own). Must run before the merge step below, in the same
      # job/working directory — .git/info/attributes is per-checkout state (design D6 risk).
      - name: Register org-declared protected paths
        shell: python
        run: |
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, ".")
          from panopticon.config import load_org_config

          protected_paths = load_org_config(".")["protected_paths"]

          attrs_path = Path(".git/info/attributes")
          attrs_path.parent.mkdir(parents=True, exist_ok=True)
          attrs_path.write_text(
              "".join(f"{path} merge=ours\n" for path in protected_paths), encoding="utf-8"
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Org-declared protected paths\n\n")
              if protected_paths:
                  handle.write(
                      "The following `protected_paths` entries were protected from this sync "
                      "(never visible in the tracked tree — this step summary is the audit trail):\n\n"
                  )
                  for path in protected_paths:
                      handle.write(f"- `{path}`\n")
              else:
                  handle.write("No `protected_paths` entries declared in `panopticon.config.json`.\n")

      - name: Merge template changes
        run: |
          # Detect whether repos share history (first-time sync after "Use this template" has none).
          # When there is no common ancestor every shared file shows as add/add conflict, which is
          # always safe to resolve with -X theirs because the instance only contains files that came
          # from the template at creation time.  Instance-specific files (panopticon.config.json,
          # org skills, etc.) don't exist in the template so they are never overridden.
          if git merge-base HEAD template/main > /dev/null 2>&1; then
            MERGE_OPTS="--no-edit"
          else
            echo "No common ancestor detected — first-time sync. Template version wins for any conflicts."
            MERGE_OPTS="--no-edit --allow-unrelated-histories -X theirs"
          fi

          if ! git merge template/main $MERGE_OPTS 2>&1; then
            echo "::error::Merge conflict — resolve locally then push:"
            echo "::error::  git remote add template https://github.com/industrial-curiosity/panopticon-ay-eye.git"
            echo "::error::  git fetch template main"
            echo "::error::  git merge template/main --allow-unrelated-histories"
            echo "::error::  # resolve conflicts, then:"
            echo "::error::  git push origin main"
            exit 1
          fi

      # Non-blocking: registered protected-config paths (panopticon.diagram.config.json today)
      # were excluded from the merge above, so the instance's copy is unchanged. This only warns
      # when the template's incoming version and the instance's current copy have different
      # top-level JSON fields, so an org owner notices a newly-added/removed config option without
      # it being silently applied or silently missed (design D7).
      - name: Warn on protected-config field drift
        shell: python
        run: |
          import json
          import subprocess
          import sys

          sys.path.insert(0, ".")
          from panopticon.config import PROTECTED_CONFIG_FILES

          for path in PROTECTED_CONFIG_FILES:
              incoming = subprocess.run(
                  ["git", "show", f"template/main:{path}"], capture_output=True, text=True,
              )
              if incoming.returncode != 0:
                  continue  # path doesn't exist in the incoming template version
              try:
                  incoming_fields = set(json.loads(incoming.stdout))
              except json.JSONDecodeError:
                  print(f"::warning::{path}: incoming template version is not valid JSON; skipping field-diff check")
                  continue
              try:
                  with open(path, encoding="utf-8") as handle:
                      current_fields = set(json.load(handle))
              except FileNotFoundError:
                  continue  # instance never customized it — nothing to compare
              added = sorted(incoming_fields - current_fields)
              removed = sorted(current_fields - incoming_fields)
              if added:
                  print(f"::warning::{path}: the template added field(s) {added} not present in your copy")
              if removed:
                  print(f"::warning::{path}: the template removed field(s) {removed} still present in your copy")

      - name: Push
        run: git push origin main
