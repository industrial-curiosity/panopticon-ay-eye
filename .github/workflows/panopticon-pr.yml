# Compatibility guard for child callers generated before configurable provider workflows.
# This entrypoint intentionally performs no evaluation. Regenerate the child caller so it points
# directly to panopticon-pr-litellm.yml or panopticon-pr-bedrock.yml.
name: Panopticon PR caller requires regeneration

on:
  workflow_call:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out child configuration
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Print exact migration commands
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          config_path = Path("panopticon/config.json")
          if config_path.exists():
              child_config = json.loads(config_path.read_text(encoding="utf-8"))
              instance = child_config["instance"]
              branch = child_config.get("instance_default_branch") or "main"
          else:
              workflow_ref = os.environ["GITHUB_WORKFLOW_REF"]
              instance = workflow_ref.split("/.github/workflows/", 1)[0]
              branch = "main"
          actions_url = (
              f"https://github.com/{instance}/actions/workflows/configure-panopticon.yml"
          )
          installer = (
              "curl -fsSL https://raw.githubusercontent.com/industrial-curiosity/"
              "panopticon-ay-eye/main/install.py | "
              f"PANOPTICON_INSTANCE='{instance}' python3"
          )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## This child caller is obsolete\n\n")
              summary.write("First ensure the instance has an explicit provider:\n\n")
              summary.write(f"1. Open {actions_url}\n")
              summary.write("2. Select **Run workflow**.\n")
              summary.write(f"3. Select branch `{branch}`.\n")
              summary.write("4. Select LiteLLM or Bedrock and review the name fields.\n")
              summary.write("5. Run it and wait for the green completed configuration commit.\n\n")
              summary.write("Equivalent CLI command (LiteLLM defaults shown):\n\n~~~bash\n")
              summary.write(
                  f"gh workflow run configure-panopticon.yml --repo {instance} "
                  f"--ref {branch} -f provider=litellm\n"
              )
              summary.write(f"gh run watch --repo {instance}\n~~~\n\n")
              summary.write("Then run this from inside the child clone:\n\n~~~bash\n")
              summary.write(installer + "\n~~~\n\n")
              summary.write(
                  "Review and commit the generated changes, push them, then rerun or await "
                  "this PR workflow.\n"
              )
          raise SystemExit(
              "::error::Panopticon child caller is obsolete; see the step summary for exact "
              "instance configuration and child-bootstrap commands"
          )
