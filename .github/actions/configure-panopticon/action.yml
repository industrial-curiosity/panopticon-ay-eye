name: Configure Panopticon provider
description: Validate and persist one trusted Panopticon provider contract

inputs:
  provider:
    description: Trusted provider identifier fixed by the calling workflow
    required: true
  credential-mode:
    description: Bedrock credential mode; empty for LiteLLM
    required: false
    default: ""
  instance-token-name:
    description: Organization secret name for the instance checkout token
    required: true
  api-key-name:
    description: LiteLLM organization secret name; empty for Bedrock
    required: false
    default: ""
  model-variable-name:
    description: Organization variable name for the provider model
    required: true
  endpoint-variable-name:
    description: LiteLLM endpoint variable name; empty for Bedrock
    required: false
    default: ""
  aws-region-variable-name:
    description: Bedrock GitHub-OIDC region variable name; empty otherwise
    required: false
    default: ""
  aws-role-arn-variable-name:
    description: Bedrock GitHub-OIDC role ARN variable name; empty otherwise
    required: false
    default: ""
  timeout-seconds-variable-name:
    description: Organization variable name for the per-request timeout
    required: true
  max-attempts-variable-name:
    description: Organization variable name for transport attempts
    required: true
  max-correction-attempts-variable-name:
    description: Organization variable name for structured-response correction attempts
    required: true
  job-timeout-minutes-variable-name:
    description: Organization variable name for the PR-evaluation job timeout
    required: true
  target-branch:
    description: Instance branch that receives the validated configuration commit
    required: true

runs:
  using: composite
  steps:
    - name: Validate and persist provider names
      shell: python
      env:
        PYTHONPATH: ${{ github.workspace }}
        PROVIDER: ${{ inputs.provider }}
        CREDENTIAL_MODE: ${{ inputs.credential-mode }}
        INSTANCE_TOKEN_NAME: ${{ inputs.instance-token-name }}
        API_KEY_NAME: ${{ inputs.api-key-name }}
        MODEL_VARIABLE_NAME: ${{ inputs.model-variable-name }}
        ENDPOINT_VARIABLE_NAME: ${{ inputs.endpoint-variable-name }}
        AWS_REGION_VARIABLE_NAME: ${{ inputs.aws-region-variable-name }}
        AWS_ROLE_ARN_VARIABLE_NAME: ${{ inputs.aws-role-arn-variable-name }}
        TIMEOUT_SECONDS_VARIABLE_NAME: ${{ inputs.timeout-seconds-variable-name }}
        MAX_ATTEMPTS_VARIABLE_NAME: ${{ inputs.max-attempts-variable-name }}
        MAX_CORRECTION_ATTEMPTS_VARIABLE_NAME: ${{ inputs.max-correction-attempts-variable-name }}
        JOB_TIMEOUT_MINUTES_VARIABLE_NAME: ${{ inputs.job-timeout-minutes-variable-name }}
      run: |
        import json
        import os

        from panopticon.configure_instance import configure
        from panopticon.providers import ProviderConfigError

        def fail(reason):
            with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
                summary.write(f"## Panopticon {os.environ['PROVIDER']} configuration failed\n\n")
                summary.write(f"{reason}\n\n")
                summary.write("Correct the workflow-dispatch inputs, then rerun this workflow.\n")
            raise SystemExit(f"::error::{reason}; see the step summary")

        name_environment = {
            "instance_token": "INSTANCE_TOKEN_NAME",
            "api_key": "API_KEY_NAME",
            "model": "MODEL_VARIABLE_NAME",
            "endpoint": "ENDPOINT_VARIABLE_NAME",
            "aws_region": "AWS_REGION_VARIABLE_NAME",
            "aws_role_arn": "AWS_ROLE_ARN_VARIABLE_NAME",
            "timeout_seconds": "TIMEOUT_SECONDS_VARIABLE_NAME",
            "max_attempts": "MAX_ATTEMPTS_VARIABLE_NAME",
            "max_correction_attempts": "MAX_CORRECTION_ATTEMPTS_VARIABLE_NAME",
            "job_timeout_minutes": "JOB_TIMEOUT_MINUTES_VARIABLE_NAME",
        }
        names = {
            logical: os.environ[environment_name]
            for logical, environment_name in name_environment.items()
            if os.environ[environment_name]
        }

        try:
            configured = configure(
                ".",
                os.environ["PROVIDER"],
                names,
                os.environ["CREDENTIAL_MODE"] or None,
            )
        except (ProviderConfigError, json.JSONDecodeError) as exc:
            fail(f"Panopticon provider configuration is invalid: {exc}")
        except Exception as exc:
            fail(f"Unexpected provider configuration failure: {exc}")

        with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
            summary.write(f"## Panopticon provider: `{configured['provider']}`\n\n")
            summary.write("Configure these organization-level Actions names with values:\n\n")
            for logical, name in configured["secrets"].items():
                summary.write(f"- Secret `{name}` ({logical})\n")
            for logical, name in configured["variables"].items():
                summary.write(f"- Variable `{name}` ({logical})\n")
            summary.write("\nNo credential values were accepted or persisted by this workflow.\n")

    - name: Commit instance configuration
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
      run: |
        set -euo pipefail

        fail() {
          local reason=${1:?failure reason}
          {
            echo
            echo "## Panopticon ${PROVIDER} configuration failed"
            echo
            echo "${reason}"
            echo
            echo "Correct the reported problem, then rerun this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::${reason}; see the step summary"
          exit 1
        }

        if [ -z "${TARGET_BRANCH//[[:space:]]/}" ]; then
          fail "The target instance branch is empty."
        fi
        if git diff --quiet -- panopticon.config.json; then
          echo "Configuration already matches the requested ${PROVIDER} contract." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        git config user.name "github-actions[bot]" ||
          fail "Git could not set the configuration commit user name."
        git config user.email "github-actions[bot]@users.noreply.github.com" ||
          fail "Git could not set the configuration commit user email."
        git add panopticon.config.json ||
          fail "Git could not stage panopticon.config.json."
        git commit -m "chore: configure Panopticon ${PROVIDER} provider" ||
          fail "Git could not commit the validated ${PROVIDER} configuration."
        if ! git push origin "HEAD:${TARGET_BRANCH}"; then
          {
            echo
            echo "## Configuration was validated but could not be pushed"
            echo
            echo "Branch protection may require a pull request. Apply this validated diff on a"
            echo "local branch, open a PR, and merge it:"
            echo
            echo '```diff'
            git show --format= -- panopticon.config.json
            echo '```'
            echo "Panopticon is not configured until that commit reaches ${TARGET_BRANCH}."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::The validated ${PROVIDER} configuration could not be pushed; see the step summary"
          exit 1
        fi
